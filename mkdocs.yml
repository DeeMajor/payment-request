site_name: Payment Request MVP
site_description: Documentation for the mobile payment request platform
site_author: Andile Dumakude

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

  palette:
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Dark mode

    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Light mode

nav:
  - Home: index.md
  - Product:
      - Product Requirements Document: PRODUCT_REQUIREMENTS_DOCUMENT.md
